<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Toko Hana - 30 Detik</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:linear-gradient(135deg,#ff9a9e 0%,#fecfef 50%,#fecfef 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.3);max-width:500px;width:100%;padding:30px}
h1{color:#e76f51;text-align:center;margin-bottom:10px;font-size:28px}
.subtitle{text-align:center;color:#666;margin-bottom:25px;font-size:14px}
.box{margin-bottom:20px}
label{display:block;margin-bottom:8px;font-weight:600;color:#333}
input{width:100%;padding:12px;border:2px solid #ddd;border-radius:10px;font-size:16px;transition:0.3s}
input:focus{outline:none;border-color:#e76f51}
button{width:100%;padding:14px;background:linear-gradient(135deg,#e76f51 0%,#f4a261 100%);color:#fff;border:none;border-radius:10px;font-size:18px;font-weight:700;cursor:pointer;transition:0.3s;margin-top:10px}
button:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(231,111,81,0.4)}
button:disabled{opacity:0.6;cursor:not-allowed}
.timer{font-size:48px;font-weight:700;text-align:center;color:#e76f51;margin:20px 0}
.soal{font-size:20px;font-weight:600;margin-bottom:15px;color:#333}
.option{padding:12px;margin-bottom:10px;background:#f8f9fa;border:2px solid #ddd;border-radius:10px;cursor:pointer;transition:0.2s}
.option:hover{background:#e9ecef;border-color:#e76f51}
.option.selected{background:#e76f51;color:#fff;border-color:#e76f51}
.hasil{font-size:24px;text-align:center;font-weight:700;margin:20px 0}
.error{color:#d32f2f;background:#ffebee;padding:10px;border-radius:8px;margin-top:10px;font-size:14px}
.hidden{display:none}
</style>
</head>
<body>
<div class="container">
  <div id="startBox">
    <h1>🎯 Kuis Toko Hana</h1>
    <p class="subtitle">Jawab 10 soal dalam 30 detik!</p>
    <div class="box">
      <label>Masukkan Nama Kamu</label>
      <input type="text" id="namaInput" placeholder="Contoh: Hana" autocomplete="off">
    </div>
    <button id="btnMulai">Mulai Kuis 30 Detik</button>
    <div id="errorMsg" class="error hidden"></div>
  </div>

  <div id="kuisBox" class="hidden">
    <div class="timer" id="timer">30</div>
    <div id="soalBox">
      <div class="soal" id="soalText"></div>
      <div id="optionsBox"></div>
    </div>
  </div>

  <div id="hasilBox" class="hidden">
    <h1>Selesai! 🎉</h1>
    <div class="hasil" id="skorText"></div>
    <p style="text-align:center;color:#666">Hasil kamu sudah tersimpan</p>
  </div>
</div>

<script>
// ===== SETTING - UDAH SESUAI REPO KAMU =====
const API_URL = '/api/save';
const USERNAME = 'Hans23g';
const REPO = 'kuis-toko-hana';
const SOAL_URL = `https://raw.githubusercontent.com/${USERNAME}/${REPO}/main/soal.txt`;
// ============================================

let soalList = [];
let jawabanUser = {};
let timerInterval;
let waktu = 30;
let namaPeserta = '';
let soalIndex = 0;

const startBox = document.getElementById('startBox');
const kuisBox = document.getElementById('kuisBox');
const hasilBox = document.getElementById('hasilBox');
const namaInput = document.getElementById('namaInput');
const btnMulai = document.getElementById('btnMulai');
const errorMsg = document.getElementById('errorMsg');
const timer = document.getElementById('timer');
const soalText = document.getElementById('soalText');
const optionsBox = document.getElementById('optionsBox');
const skorText = document.getElementById('skorText');

function showError(msg){
  errorMsg.textContent = msg;
  errorMsg.classList.remove('hidden');
}

async function loadSoal(){
  try{
    const res = await fetch(SOAL_URL + '?t=' + Date.now());
    if(!res.ok) throw new Error('Gagal load soal.txt');
    const txt = await res.text();
    soalList = txt.trim().split('\n').map(line=>{
      const [soal,a,b,c,benar] = line.split('|');
      return {soal,a,b,c,benar};
    }).filter(s=>s.soal);
    if(soalList.length === 0) throw new Error('soal.txt kosong');
  }catch(e){
    showError('Error: ' + e.message + '. Cek USERNAME & REPO di kode');
    throw e;
  }
}

btnMulai.onclick = async ()=>{
  namaPeserta = namaInput.value.trim();
  if(!namaPeserta) return showError('Nama wajib diisi');
  if(namaPeserta.length < 2) return showError('Nama minimal 2 huruf');
  
  btnMulai.disabled = true;
  btnMulai.textContent = 'Mengecek...';
  errorMsg.classList.add('hidden');

  try{
    // Cek nama ke API
    const res = await fetch(API_URL + '?cek=' + encodeURIComponent(namaPeserta));
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    if(data.sudah_ikut) return showError(`Kamu sudah ikut kuis jam ${data.jam}`);

    // Load soal
    await loadSoal();
    
    // Mulai kuis
    startBox.classList.add('hidden');
    kuisBox.classList.remove('hidden');
    mulaiTimer();
    tampilSoal();
  }catch(e){
    showError('Gagal: ' + e.message);
    btnMulai.disabled = false;
    btnMulai.textContent = 'Mulai Kuis 30 Detik';
  }
};

function mulaiTimer(){
  timerInterval = setInterval(()=>{
    waktu--;
    timer.textContent = waktu;
    if(waktu <= 0){
      clearInterval(timerInterval);
      selesaiKuis();
    }
  }, 1000);
}

function tampilSoal(){
  if(soalIndex >= soalList.length) return selesaiKuis();
  const s = soalList[soalIndex];
  soalText.textContent = `Soal ${soalIndex+1}: ${s.soal}`;
  optionsBox.innerHTML = '';
  ['a','b','c'].forEach(opt=>{
    const div = document.createElement('div');
    div.className = 'option';
    div.textContent = s[opt];
    div.onclick = ()=>{
      document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
      div.classList.add('selected');
      jawabanUser[soalIndex] = opt;
      setTimeout(()=>{
        soalIndex++;
        tampilSoal();
      }, 300);
    };
    optionsBox.appendChild(div);
  });
}

async function selesaiKuis(){
  clearInterval(timerInterval);
  kuisBox.classList.add('hidden');
  hasilBox.classList.remove('hidden');

  let benar = 0;
  soalList.forEach((s,i)=>{
    if(jawabanUser[i] === s.benar) benar++;
  });
  const skor = benar * 10;
  skorText.textContent = `Benar: ${benar}/10 | Skor: ${skor}`;

  // Simpan ke API
  try{
    await fetch(API_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        nama: namaPeserta,
        jawaban: JSON.stringify(jawabanUser),
        benar: benar,
        skor: skor
      })
    });
  }catch(e){
    console.log('Gagal simpan:', e);
  }
}
</script>
</body>
</html>
