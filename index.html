<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Toko Hana</title>
<style>
:root{--warna:#e76f51;--benar:#2a9d8f;--salah:#e63946}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}

.container{max-width:550px;width:100%;background:#fff;border-radius:25px;padding:35px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}

h1{color:var(--warna);text-align:center;margin-bottom:25px;font-size:26px}

.inputBox{text-align:center}
.inputBox p{color:#666;margin-bottom:15px;font-size:15px}
.inputBox input{width:100%;padding:16px;border:2px solid #e0e0e0;border-radius:12px;font-size:16px;margin-bottom:15px}
.inputBox button{width:100%;padding:16px;background:var(--warna);color:#fff;border:none;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer}
.errorText{color:var(--salah);margin-top:10px;font-size:14px;font-weight:600}

.kuisBox{display:none}
.timer{font-size:24px;font-weight:800;color:var(--salah);text-align:center;margin-bottom:20px;padding:12px;background:#fff0f0;border-radius:12px}
.soal{font-size:19px;font-weight:700;margin-bottom:25px;line-height:1.6;color:#333}
.pilihan button{width:100%;padding:16px;margin-bottom:12px;border:3px solid #e0e0e0;background:#fff;border-radius:12px;font-size:16px;cursor:pointer;text-align:left;font-weight:600}
.pilihan button.benar{border-color:var(--benar)!important;background:var(--benar)!important;color:#fff}
.pilihan button.salah{border-color:var(--salah)!important;background:var(--salah)!important;color:#fff}
.progress{margin-top:20px;font-size:15px;color:#666;text-align:center;font-weight:600}

.hasilBox{display:none;text-align:center}
.hasilBox h2{color:var(--warna);margin-bottom:20px;font-size:28px}

.scoreCircle{width:150px;height:150px;border-radius:50%;background:conic-gradient(var(--warna) 0deg, var(--warna) var(--deg), #f0f0f0 var(--deg));display:flex;align-items:center;justify-content:center;margin:25px auto;position:relative}
.scoreCircle::before{content:'';width:120px;height:120px;background:#fff;border-radius:50%;position:absolute}
#skorText{position:relative;z-index:1;font-size:32px;font-weight:800;color:var(--warna)}

.motivasiBox{
  background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
  color:#fff;
  padding:25px;
  border-radius:15px;
  margin:25px 0;
  text-align:center;
  min-height:100px;
}
.motivasiBox h3{font-size:22px;margin-bottom:12px}
.motivasiBox p{font-size:15px;line-height:1.7}

.hidden{display:none}
</style>
</head>
<body>
<div class="container">
  <h1>🎯 Kuis Toko Hana</h1>

  <div id="inputBox" class="inputBox">
    <p>Masukkan nama kamu buat mulai kuis!</p>
    <input type="text" id="namaInput" placeholder="Nama lengkap kamu">
    <button onclick="cekNama()">🚀 Mulai Kuis!</button>
    <p id="errorText" class="errorText"></p>
  </div>

  <div id="kuisBox" class="kuisBox">
    <div class="timer" id="timerText">Sisa waktu: 30 detik</div>
    <div class="soal" id="soalText">Loading...</div>
    <div class="pilihan">
      <button onclick="pilihJawaban('a')" id="btnA">A. Loading</button>
      <button onclick="pilihJawaban('b')" id="btnB">B. Loading</button>
      <button onclick="pilihJawaban('c')" id="btnC">C. Loading</button>
    </div>
    <div class="progress" id="progressText">Soal 1/20</div>
  </div>

  <div id="hasilBox" class="hasilBox">
    <h2>🎉 Kuis Selesai!</h2>
    <div class="scoreCircle" id="scoreCircle">
      <div id="skorText">0</div>
    </div>
    <div class="motivasiBox" id="motivasiBox">
      <h3>Loading...</h3>
      <p>Tunggu sebentar...</p>
    </div>
    <p style="color:#666;font-size:14px">Makasih udah ikut kuis Toko Hana! ❤️</p>
  </div>
</div>

<script>
const API_URL = '/api/save';

let namaPeserta = '';
let soalList = [];
let jawabanUser = [];
let indexSoal = 0;
let timerInterval = null;
let waktuSisa = 30;

const inputBox = document.getElementById('inputBox');
const kuisBox = document.getElementById('kuisBox');
const hasilBox = document.getElementById('hasilBox');
const errorText = document.getElementById('errorText');
const timerText = document.getElementById('timerText');
const soalText = document.getElementById('soalText');
const btnA = document.getElementById('btnA');
const btnB = document.getElementById('btnB');
const btnC = document.getElementById('btnC');
const progressText = document.getElementById('progressText');
const skorText = document.getElementById('skorText');
const scoreCircle = document.getElementById('scoreCircle');
const motivasiBox = document.getElementById('motivasiBox');

const kataMotivasi = [
  {min:0, max:40, judul:"Kerenn! Udah Mau Nyoba 💪", pesan:"Skor segini wajar banget! Yang penting kamu udah berani mulai. Besok ikut lagi pasti naik! Toko Hana temenin kamu belajar 🔥"},
  {min:50, max:70, judul:"MANTAP JIWA! 🔥🔥", pesan:"Skor kamu udah ngalahin banyak orang! Tinggal gas dikit lagi ke 100. Pertahanin ya!"},
  {min:80, max:100, judul:"LEGENDARY! KAMU JUARA! 🏆👑", pesan:"GOKIL! Skor segini bukan kebetulan. Ini hasil otak encer + usaha keras kamu. Bangga banget!"}
];

// SOAL DEFAULT 20 BUAH - biar nggak error kalau soal.txt gagal
const SOAL_DEFAULT = [
  {soal:"Ibukota Indonesia?", a:"Bandung", b:"Jakarta", c:"Surabaya", benar:"b", waktu:30},
  {soal:"2 + 2 x 2 =?", a:"6", b:"8", c:"4", benar:"a", waktu:30},
  {soal:"Warna bendera RI?", a:"Merah Putih", b:"Merah Kuning", c:"Putih Biru", benar:"a", waktu:30},
  {soal:"Hewan tercepat darat?", a:"Singa", b:"Cheetah", c:"Kuda", benar:"b", waktu:30},
  {soal:"Planet terdekat matahari?", a:"Bumi", b:"Merkurius", c:"Venus", benar:"b", waktu:30},
  {soal:"1 kg =... gram?", a:"100", b:"1000", c:"10000", benar:"b", waktu:30},
  {soal:"Gunung tertinggi di dunia?", a:"Everest", b:"Kilimanjaro", c:"Fuji", benar:"a", waktu:30},
  {soal:"Air mendidih di suhu?", a:"50°C", b:"100°C", c:"150°C", benar:"b", waktu:30},
  {soal:"Jumlah sisi segitiga?", a:"2", b:"3", c:"4", benar:"b", waktu:30},
  {soal:"Bahasa resmi Indonesia?", a:"Jawa", b:"Indonesia", c:"Inggris", benar:"b", waktu:30},
  {soal:"Lambang negara RI?", a:"Garuda", b:"Komodo", c:"Harimau", benar:"a", waktu:30},
  {soal:"Tahun kemerdekaan RI?", a:"1945", b:"1944", c:"1946", benar:"a", waktu:30},
  {soal:"Warna daun?", a:"Merah", b:"Hijau", c:"Biru", benar:"b", waktu:30},
  {soal:"Alat ukur suhu?", a:"Termometer", b:"Speedometer", c:"Barometer", benar:"a", waktu:30},
  {soal:"Jumlah hari seminggu?", a:"5", b:"6", c:"7", benar:"c", waktu:30},
  {soal:"Ikan hidup di?", a:"Darat", b:"Air", c:"Udara", benar:"b", waktu:30},
  {soal:"Matahari terbit dari?", a:"Barat", b:"Timur", c:"Utara", benar:"b", waktu:30},
  {soal:"Toko Hana jual?", a:"Baju", b:"Sembako", c:"Mobil", benar:"b", waktu:30},
  {soal:"5 x 5 =?", a:"20", b:"25", c:"30", benar:"b", waktu:30},
  {soal:"Hari setelah Senin?", a:"Selasa", b:"Rabu", c:"Kamis", benar:"a", waktu:30}
];

function cekNama(){
  namaPeserta = document.getElementById('namaInput').value.trim();
  if(namaPeserta.length < 3){
    errorText.textContent = '⚠️ Nama minimal 3 karakter ya';
    return;
  }
  errorText.textContent = '';
  mulaiKuis();
}

async function mulaiKuis(){
  inputBox.classList.add('hidden');
  kuisBox.style.display = 'block';

  // Pake soal default aja biar aman, nggak fetch2 lagi
  soalList = SOAL_DEFAULT;
  jawabanUser = new Array(soalList.length).fill('');
  tampilSoal();
}

function tampilSoal(){
  if(indexSoal >= soalList.length){
    selesaiKuis();
    return;
  }
  const s = soalList[indexSoal];
  soalText.textContent = `${indexSoal+1}. ${s.soal}`;
  btnA.textContent = 'A. ' + s.a;
  btnB.textContent = 'B. ' + s.b;
  btnC.textContent = 'C. ' + s.c;
  progressText.textContent = `Soal ${indexSoal+1}/${soalList.length}`;
  [btnA,btnB,btnC].forEach(b=>{b.className = '';b.disabled = false});
  clearInterval(timerInterval);
  waktuSisa = s.waktu;
  timerText.textContent = `Sisa waktu: ${waktuSisa} detik`;
  timerInterval = setInterval(()=>{
    waktuSisa--;
    timerText.textContent = `Sisa waktu: ${waktuSisa} detik`;
    if(waktuSisa <= 0){
      clearInterval(timerInterval);
      jawabanUser[indexSoal] = '';
      nextSoal();
    }
  }, 1000);
}

function pilihJawaban(jwb){
  clearInterval(timerInterval);
  jawabanUser[indexSoal] = jwb;
  const benar = soalList[indexSoal].benar;
  const btnPilih = document.getElementById('btn' + jwb.toUpperCase());
  const btnBenar = document.getElementById('btn' + benar.toUpperCase());
  [btnA,btnB,btnC].forEach(b=>b.disabled = true);
  if(jwb === benar){
    btnPilih.classList.add('benar');
  } else {
    btnPilih.classList.add('salah');
    btnBenar.classList.add('benar');
  }
  setTimeout(nextSoal, 700);
}

function nextSoal(){
  indexSoal++;
  tampilSoal();
}

function selesaiKuis(){
  clearInterval(timerInterval);

  // PAKSA MUNCULIN HASIL DULU, baru hitung skor
  kuisBox.style.display = 'none';
  hasilBox.style.display = 'block';

  let benar = 0;
  soalList.forEach((s,i)=>{
    if(jawabanUser[i] === s.benar) benar++;
  });

  const skor = benar * 10;
  const persen = (skor / 100) * 360;

  skorText.textContent = skor;
  scoreCircle.style.setProperty('--deg', persen + 'deg');

  // Kata motivasi langsung set
  const motivasi = kataMotivasi.find(m => skor >= m.min && skor <= m.max) || kataMotivasi[0];
  motivasiBox.innerHTML = `<h3>${motivasi.judul}</h3><p>${motivasi.pesan}</p>`;

  // Save data - kalau error yaudah, nggak ngaruh ke tampilan
  fetch(API_URL, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({nama: namaPeserta, jawaban: JSON.stringify(jawabanUser), benar, skor})
  }).catch(e => console.log('Save gagal, tapi hasil tetep muncul'));
}
</script>
</body>
</html>
