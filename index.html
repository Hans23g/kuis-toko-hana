<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Toko Hana</title>
<style>
:root{--warna:#e76f51}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:linear-gradient(135deg,#f5f7fa 0%,#c3cfe2 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.container{max-width:500px;width:100%;background:#fff;border-radius:20px;padding:30px;box-shadow:0 10px 40px rgba(0,0,0,0.1)}
h1{color:var(--warna);text-align:center;margin-bottom:20px;font-size:24px}
.inputBox{text-align:center}
.inputBox input{width:100%;padding:15px;border:2px solid #ddd;border-radius:10px;font-size:16px;margin-bottom:15px}
.inputBox button{width:100%;padding:15px;background:var(--warna);color:#fff;border:none;border-radius:10px;font-size:18px;font-weight:700;cursor:pointer}
.inputBox button:hover{opacity:0.9}
.kuisBox{display:none}
.timer{font-size:20px;font-weight:700;color:#e63946;text-align:center;margin-bottom:15px}
.soal{font-size:18px;font-weight:600;margin-bottom:20px;line-height:1.5}
.pilihan button{width:100%;padding:15px;margin-bottom:10px;border:2px solid #ddd;background:#fff;border-radius:10px;font-size:16px;cursor:pointer;text-align:left;transition:0.2s}
.pilihan button:hover{border-color:var(--warna);background:#fff5f3}
.pilihan button.terpilih{background:var(--warna);color:#fff;border-color:var(--warna)}
.progress{margin-top:15px;font-size:14px;color:#666;text-align:center}
.hasilBox{display:none;text-align:center}
.hasilBox h2{color:var(--warna);margin-bottom:15px}
#skorText{font-size:22px;font-weight:700;margin:20px 0}
.hidden{display:none}
</style>
</head>
<body>
<div class="container">
  <h1>🎯 Kuis Toko Hana</h1>
  
  <div id="inputBox" class="inputBox">
    <p style="margin-bottom:15px">Masukkan nama kamu untuk mulai</p>
    <input type="text" id="namaInput" placeholder="Nama lengkap">
    <button onclick="cekNama()">Mulai Kuis 30 Detik</button>
    <p id="errorText" style="color:red;margin-top:10px"></p>
  </div>

  <div id="kuisBox" class="kuisBox">
    <div class="timer" id="timerText">Sisa waktu: 30 detik</div>
    <div class="soal" id="soalText"></div>
    <div class="pilihan">
      <button onclick="pilihJawaban('a')" id="btnA"></button>
      <button onclick="pilihJawaban('b')" id="btnB"></button>
      <button onclick="pilihJawaban('c')" id="btnC"></button>
    </div>
    <div class="progress" id="progressText">Soal 1/20</div>
  </div>

  <div id="hasilBox" class="hasilBox">
    <h2>🎉 Kuis Selesai!</h2>
    <p id="skorText"></p>
    <p style="color:#666">Data kamu sudah tersimpan. Terima kasih!</p>
  </div>
</div>

<script>
// SETTING
const API_URL = '/api/save';
const SOAL_URL = 'soal.txt?v=' + Date.now();
const USERNAME = 'Hans23g';
const REPO = 'kuis-toko-hana';

// Load tema dari localStorage
const warnaTema = localStorage.getItem('temaWarna') || '#e76f51';
document.documentElement.style.setProperty('--warna', warnaTema);

let namaPeserta = '';
let soalList = [];
let jawabanUser = [];
let indexSoal = 0;
let timerInterval = null;
let waktuSisa = 30;

const inputBox = document.getElementById('inputBox');
const kuisBox = document.getElementById('kuisBox');
const hasilBox = document.getElementById('hasilBox');
const errorText = document.getElementById('errorText');
const timerText = document.getElementById('timerText');
const soalText = document.getElementById('soalText');
const btnA = document.getElementById('btnA');
const btnB = document.getElementById('btnB');
const btnC = document.getElementById('btnC');
const progressText = document.getElementById('progressText');
const skorText = document.getElementById('skorText');

async function cekNama(){
  namaPeserta = document.getElementById('namaInput').value.trim();
  if(namaPeserta.length < 3){
    errorText.textContent = 'Nama minimal 3 karakter';
    return;
  }
  
  // Cek duplikat
  try{
    const res = await fetch(`https://raw.githubusercontent.com/${USERNAME}/${REPO}/main/data_peserta.json?t=${Date.now()}`);
    const data = await res.json();
    if(data.some(p => p.nama.toLowerCase() === namaPeserta.toLowerCase())){
      errorText.textContent = 'Nama ini sudah ikut kuis!';
      return;
    }
  }catch(e){}
  
  errorText.textContent = '';
  mulaiKuis();
}

async function mulaiKuis(){
  inputBox.classList.add('hidden');
  kuisBox.style.display = 'block';
  
  // Load soal
  const res = await fetch(SOAL_URL);
  const txt = await res.text();
  const lines = txt.trim().split('\n');
  
  soalList = lines.map(line=>{
    const parts = line.split('|');
    return {
      soal: parts[0],
      a: parts[1],
      b: parts[2],
      c: parts[3],
      benar: parts[4].trim().toLowerCase(),
      waktu: parseInt(parts[5]) || 30 // default 30 detik
    };
  });
  
  jawabanUser = new Array(soalList.length).fill('');
  tampilSoal();
}

function tampilSoal(){
  if(indexSoal >= soalList.length){
    selesaiKuis();
    return;
  }
  
  const s = soalList[indexSoal];
  soalText.textContent = `${indexSoal+1}. ${s.soal}`;
  btnA.textContent = 'A. ' + s.a;
  btnB.textContent = 'B. ' + s.b;
  btnC.textContent = 'C. ' + s.c;
  progressText.textContent = `Soal ${indexSoal+1}/${soalList.length}`;
  
  // Reset pilihan
  [btnA,btnB,btnC].forEach(b=>b.classList.remove('terpilih'));
  if(jawabanUser[indexSoal]){
    document.getElementById('btn'+jawabanUser[indexSoal].toUpperCase()).classList.add('terpilih');
  }
  
  // Timer per soal
  clearInterval(timerInterval);
  waktuSisa = s.waktu;
  timerText.textContent = `Sisa waktu: ${waktuSisa} detik`;
  
  timerInterval = setInterval(()=>{
    waktuSisa--;
    timerText.textContent = `Sisa waktu: ${waktuSisa} detik`;
    if(waktuSisa <= 0){
      clearInterval(timerInterval);
      nextSoal();
    }
  }, 1000);
}

function pilihJawaban(jwb){
  jawabanUser[indexSoal] = jwb;
  [btnA,btnB,btnC].forEach(b=>b.classList.remove('terpilih'));
  document.getElementById('btn'+jwb.toUpperCase()).classList.add('terpilih');
  setTimeout(nextSoal, 300);
}

function nextSoal(){
  clearInterval(timerInterval);
  indexSoal++;
  tampilSoal();
}

async function selesaiKuis(){
  clearInterval(timerInterval);
  kuisBox.style.display = 'none';
  hasilBox.classList.remove('hidden');
  
  let benar = 0;
  soalList.forEach((s,i)=>{
    if(jawabanUser[i] === s.benar) benar++;
  });
  
  const skor = benar * 10;
  skorText.textContent = `Benar: ${benar}/${soalList.length} | Skor: ${skor}`;
  
  // Simpan
  try{
    await fetch(API_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({nama: namaPeserta, jawaban: JSON.stringify(jawabanUser), benar, skor})
    });
  }catch(e){}
}

// Enter untuk mulai
document.getElementById('namaInput').addEventListener('keypress', e=>{
  if(e.key === 'Enter') cekNama();
});
</script>
</body>
</html>
